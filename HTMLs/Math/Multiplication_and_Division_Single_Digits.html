<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mixed Multiplication and Division</title>
<style>
  body {
    font-family: "Poppins", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: linear-gradient(135deg, #a0e3ff, #fff0a5);
    margin: 0;
    transition: all 0.4s ease;
  }
  h1 { margin-bottom: 20px; }
  #problem { font-size: 2.5rem; margin-bottom: 20px; }
  input { font-size: 1.5rem; text-align: center; width: 80px; padding: 5px; }
  button {
    font-size: 1.2rem;
    padding: 10px 20px;
    border: none;
    background-color: #4caf50;
    color: white;
    border-radius: 10px;
    margin: 10px;
    cursor: pointer;
  }
  button:hover { background-color: #45a049; }
  #reset { background-color: #f44336; }
  #reset:hover { background-color: #d73833; }
  #stop { background-color: #2196f3; }
  #stop:hover { background-color: #1a7bd6; }
  #pdfBtn { background-color: #ff9800; display:none; }
  #feedback { font-size: 1.3rem; font-weight: bold; margin-top: 15px; }
  #score, #attempts, #timer {
    position: absolute;
    font-size: 1.1rem;
    background-color: #ffffff99;
    padding: 6px 10px;
    border-radius: 10px;
  }
  #score { top: 15px; right: 25px; }
  #attempts { bottom: 15px; right: 25px; }
  #timer { bottom: 15px; left: 25px; }
  #summary {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    max-width: 600px;
    background-color: #ffffffcc;
    border-radius: 20px;
    padding: 20px;
    margin-top: 20px;
  }
  .correct { color: green; font-weight: bold; }
  .incorrect { color: red; font-weight: bold; }
</style>
</head>
<body>

<div id="score">Score: 0%</div>
<h1>Mixed Multiplication & Division</h1>
<div id="problem"></div>
<input type="number" id="answer" placeholder="?" />
<div>
  <button onclick="checkAnswer()">Check Answer</button>
  <button onclick="newProblem()">Next</button>
  <button id="reset" onclick="resetAll()">Reset</button>
</div>
<button id="stop" onclick="stopSession()">Stop</button>
<button id="pdfBtn" onclick="downloadPDF()">Download PDF</button>

<div id="feedback"></div>
<div id="attempts">Attempts: 0</div>
<div id="timer">Time: 0s</div>
<div id="summary"></div>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let num1, num2, correctAnswer, operation;
let totalQuestions = 0;
let correctAnswers = 0;
let answered = false;
let timeElapsed = 0;
let timerInterval = null;
let questionHistory = [];

function newProblem() {
  answered = false;
  document.getElementById("feedback").textContent = "";
  document.getElementById("answer").value = "";

  const isMultiplication = Math.random() < 0.5;

  if (isMultiplication) {
    num1 = Math.floor(Math.random() * 9) + 1;
    num2 = Math.floor(Math.random() * 9) + 1;
    operation = "×";
    correctAnswer = num1 * num2;
  } else {
    num2 = Math.floor(Math.random() * 9) + 1;
    const quotient = Math.floor(Math.random() * 9) + 1;
    num1 = num2 * quotient;
    operation = "÷";
    correctAnswer = quotient;
  }

  document.getElementById("problem").textContent = `${num1} ${operation} ${num2} = ?`;
  document.getElementById("answer").focus();
}

function checkAnswer() {
  if (answered) return;
  const userAnswer = parseInt(document.getElementById("answer").value);
  if (isNaN(userAnswer)) return;

  totalQuestions++;
  answered = true;
  let isCorrect = false;

  if (userAnswer === correctAnswer) {
    correctAnswers++;
    isCorrect = true;
    document.getElementById("feedback").textContent = "✅ Correct!";
    document.getElementById("feedback").style.color = "green";
  } else {
    document.getElementById("feedback").textContent = `❌ Nope, it’s ${correctAnswer}`;
    document.getElementById("feedback").style.color = "red";
  }

  questionHistory.push({
    question: `${num1} ${operation} ${num2}`,
    studentAnswer: userAnswer,
    correctAnswer: correctAnswer,
    correct: isCorrect
  });

  updateStats();
  setTimeout(newProblem, 1000);
}

function updateStats() {
  const percent = totalQuestions === 0 ? 0 : Math.round((correctAnswers / totalQuestions) * 100);
  document.getElementById("score").textContent = `Score: ${percent}%`;
  document.getElementById("attempts").textContent = `Attempts: ${totalQuestions}`;
}

function resetAll() {
  totalQuestions = 0;
  correctAnswers = 0;
  timeElapsed = 0;
  questionHistory = [];
  clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById("feedback").textContent = "";
  document.getElementById("timer").textContent = "Time: 0s";
  document.getElementById("summary").style.display = "none";
  document.getElementById("pdfBtn").style.display = "none";
  document.querySelectorAll("button").forEach(btn => btn.style.display = "inline-block");
  document.getElementById("problem").style.display = "block";
  document.getElementById("answer").style.display = "inline-block";
  updateStats();
  newProblem();
  startTimer();
}

function stopSession() {
  clearInterval(timerInterval);
  document.querySelectorAll("button").forEach(btn => btn.style.display = "none");
  document.getElementById("problem").style.display = "none";
  document.getElementById("answer").style.display = "none";
  document.getElementById("feedback").textContent = "";

  const percent = totalQuestions === 0 ? 0 : Math.round((correctAnswers / totalQuestions) * 100);

  let summaryHTML = `<h2>Session Summary</h2>`;
  summaryHTML += `<p><strong>Time Taken:</strong> ${timeElapsed}s</p>`;
  summaryHTML += `<p><strong>Total Questions:</strong> ${totalQuestions}</p>`;
  summaryHTML += `<p><strong>Score:</strong> ${percent}%</p><hr>`;

  questionHistory.forEach(q => {
    summaryHTML += `<p class="${q.correct ? 'correct' : 'incorrect'}">
      ${q.question} = ${q.studentAnswer}
      ${q.correct ? "✔" : `(Correct: ${q.correctAnswer})`}
    </p>`;
  });

  summaryHTML += `<button id="reset" onclick="resetAll()">Play Again</button>`;
  document.getElementById("summary").innerHTML = summaryHTML;
  document.getElementById("summary").style.display = "flex";
  document.getElementById("pdfBtn").style.display = "inline-block";
}

function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    timeElapsed++;
    document.getElementById("timer").textContent = `Time: ${timeElapsed}s`;
  }, 1000);
}

function downloadPDF() {
  if (!confirm("Don't forget to put the PDF in the correct student's folder and record the results")) return;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const now = new Date();
  const percent = totalQuestions === 0 ? 0 : Math.round((correctAnswers / totalQuestions) * 100);

  doc.setFillColor(33,150,243);
  doc.rect(0,0,210,20,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(16);
  doc.text("Mixed Multiplication & Division Report",105,13,{align:"center"});

  doc.setTextColor(0,0,0);
  doc.setFontSize(12);
  doc.text(`Date: ${now.toLocaleDateString()}`,14,30);
  doc.text(`Time: ${now.toLocaleTimeString()}`,14,38);
  doc.text(`Total Time: ${timeElapsed}s`,14,46);
  doc.text(`Total Questions: ${totalQuestions}`,14,54);
  doc.text(`Score: ${percent}%`,14,62);

  let y = 75;
  doc.setFillColor(33,150,243);
  doc.rect(14,y-8,182,10,'F');
  doc.setTextColor(255,255,255);
  doc.text("Problem",16,y);
  doc.text("Student",110,y);
  doc.text("Result",160,y);
  y += 8;

  questionHistory.forEach((q,i)=>{
    const shade = i%2===0 ? 245 : 220;
    doc.setFillColor(shade,shade,shade);
    doc.rect(14,y-6,182,8,'F');

    doc.setTextColor(0,0,0);
    doc.text(q.question,16,y);
    doc.text(String(q.studentAnswer),110,y);

    if(q.correct){
      doc.setTextColor(0,150,0);
      doc.text("Correct",160,y);
    } else {
      doc.setTextColor(200,0,0);
      doc.text(`Incorrect (${q.correctAnswer})`,160,y);
    }

    y += 8;
    if(y > 280){ doc.addPage(); y = 20; }
  });

  doc.save(`Math_Report_${now.toLocaleDateString().replace(/\//g,'-')}.pdf`);
}

document.getElementById("answer").addEventListener("keyup", function(event) {
  if (event.key === "Enter") checkAnswer();
});

newProblem();
startTimer();
</script>
</body>
</html>
